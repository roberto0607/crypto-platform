name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API — Typecheck + Test + Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cp
          POSTGRES_PASSWORD: cp
          POSTGRES_DB: cp
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U cp"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/api/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Run migrations
        run: pnpm migrate
        env:
          DATABASE_URL: postgresql://cp:cp@localhost:5433/cp

      - name: Test
        run: pnpm test
        env:
          DATABASE_URL: postgresql://cp:cp@localhost:5433/cp
          JWT_ACCESS_SECRET: ci-test-secret
          NODE_ENV: test

      - name: Build
        run: pnpm build

  web:
    name: Web — Typecheck + Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [api, web]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t crypto-platform-api:${{ github.sha }} apps/api/

      - name: Build Web image
        run: docker build -t crypto-platform-web:${{ github.sha }} apps/web/
