services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-cp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cp}
      POSTGRES_DB: ${DB_NAME:-cp}
    ports:
      - "5433:5432"
    volumes:
      - cp_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cp}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - cp_redis_data:/data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${DB_USER:-cp}:${DB_PASSWORD:-cp}@postgres:5432/${DB_NAME:-cp}
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      INSTANCE_ROLE: ALL
      RUN_MIGRATIONS_ON_BOOT: "true"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    ports:
      - "3001:3001"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  cp_postgres_data:
  cp_redis_data:
