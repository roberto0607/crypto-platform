global:
  resolve_timeout: 5m

route:
  receiver: "default"
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    - match:
        severity: critical
      receiver: "critical"
      repeat_interval: 1h

receivers:
  - name: "default"
    # Configure one of: webhook, email, slack, pagerduty
    # For initial setup, use webhook to a simple logging endpoint
    webhook_configs:
      - url: "http://host.docker.internal:3001/health"
        send_resolved: true

  - name: "critical"
    webhook_configs:
      - url: "http://host.docker.internal:3001/health"
        send_resolved: true

